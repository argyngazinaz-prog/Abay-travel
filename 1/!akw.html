<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Абай облысының қасиетті орындары</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

#sidebar{
width:720px;
background:#f4f4f4;
padding:15px;
overflow:auto;
border-right:1px solid #ccc;
}

#map{
flex:1;
}

h2{
margin-top:0;
}

.place{
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.place:hover{
background:#e7e7e7;
}

#search{
width:100%;
padding:8px;
margin-bottom:10px;
}

.slider{
display:flex;
align-items:center;
gap:5px;
margin-top:5px;
}

.slider img{
width:100%;
border-radius:6px;
}

.slider button{
background:#6a2bbf;
color:white;
border:none;
padding:5px 8px;
cursor:pointer;
border-radius:4px;
}

.routeBtn{
margin-top:8px;
padding:6px;
background:#6a2bbf;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="sidebar">

<div id="placesList"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>

var map = L.map('map').setView([50.411,80.227],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);


var userLocation=null;

navigator.geolocation.getCurrentPosition(function(position){

userLocation=[
position.coords.latitude,
position.coords.longitude
];

L.marker(userLocation)
.addTo(map)
.bindPopup("Сіздің орналасқан жеріңіз")
.openPopup();

map.setView(userLocation,10);

});


var places=[

{
name:"Ақшоқы",
coords:[46.937822,82.859619],
description:"Ақшоқы – Құнанбай әулетінің ата қонысы. Семей-Қарауыл тас жолының бойында Арқалық кезеңінен өтіп, оңға бұрылғанда21 шақырымдай жерде Құнанбай әулетінің ата қонысы болған Ақшоқы елді мекені бар. Дала данышпаны Құнанбай мен оның әулеті жерленген Ақшоқының қазақ тарихында алар орны бөлек. Абай Құнанбайұлының 175 жылдығын мерекелеу қарсаңында Құнанбай және оның әулеті жерленген қорым аумағы кеңейтіліп, толығымен абаттандырылды. Зират ішіндегі тозығы жеткен белгі тастар жаңартылды. Алаңға заманауи төсеніштер жайылып, келушілерге қолайлы жағдай тудыру мақсатында панажайлар қойылды. Қоршау ішіне ұлы Абайдың әкесіне арнаған сөздері жазылып, гүлзарлар отырғызылды. Аға сұлтан Құнанбай қажыға арнап, оның өмірі мен қайраткерлік қызметін дәріптейтін Құнанбай музейі салынды. Музей іші заман талабына сай жабдықталған: конференция залы, экспозициялық залы, музей меңгерушісінің бөлмесі, 2 қонақ бөлмесі, намазхана, асхана және санитарлық торап бөлмелерімен жасақталған. Музейдің экспозициялық залына ұлылар мекенінің тарихынан, өнер мәдениетінен, тұрмыс-салтынан көрініс беретін құнды жәдігерлер, бағалы бұйымдар, тұрмыстық заттар т.б.  қойылған. ",
images:[
"akw.jpg",
"akw1.jpg",
"akw2.jpg",
"akw3.jpg"
]
}


];


var routingControl=null;

function buildRoute(destination){

if(!userLocation){
alert("Сіздің орныныз анықталмады");
return;
}

if(routingControl){
map.removeControl(routingControl);
}

routingControl=L.Routing.control({

waypoints:[
L.latLng(userLocation),
L.latLng(destination)
],

routeWhileDragging:false

}).addTo(map);

}



var list=document.getElementById("placesList");

places.forEach(function(place){

var marker=L.marker(place.coords)
.addTo(map)
.bindPopup("<b>"+place.name+"</b><br>"+place.description);


var div=document.createElement("div");
div.className="place";

div.innerHTML=
"<b>"+place.name+"</b>"+
"<div class='slider'>"+
"<button class='prev'>◀</button>"+
"<img src='"+place.images[0]+"' class='slideImg'>"+
"<button class='next'>▶</button>"+
"</div>"+
"<p>"+place.description+"</p>"+
"<button class='routeBtn'>Маршрут</button>";


div.onclick=function(){
map.setView(place.coords,12);
marker.openPopup();
};


div.querySelector(".routeBtn").onclick=function(e){
e.stopPropagation();
buildRoute(place.coords);
};


var index=0;
var img=div.querySelector(".slideImg");


div.querySelector(".next").onclick=function(e){
e.stopPropagation();
index++;
if(index>=place.images.length) index=0;
img.src=place.images[index];
};


div.querySelector(".prev").onclick=function(e){
e.stopPropagation();
index--;
if(index<0) index=place.images.length-1;
img.src=place.images[index];
};


list.appendChild(div);

});


document.getElementById("search").addEventListener("input",function(){

var text=this.value.toLowerCase();

var items=document.getElementsByClassName("place");

for(var i=0;i<items.length;i++){

var name=items[i].querySelector("b").innerText.toLowerCase();

if(name.includes(text)){
items[i].style.display="block";
}else{
items[i].style.display="none";
}

}

});

</script>

</body>
</html>
